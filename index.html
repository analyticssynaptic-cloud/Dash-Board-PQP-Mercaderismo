<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PQP · Synaptic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --b1:#1d4ed8;--b2:#1e3a8a;--bcyan:#06b6d4;
  --ok:#16a34a;--ok-soft:#dcfce7;--warn:#d97706;--warn-soft:#fef3c7;--bad:#dc2626;--bad-soft:#fee2e2;
  --pur:#7c3aed;--teal:#0d9488;--pink:#db2777;--amber:#f59e0b;
  --ink:#0b1538;--ink2:#1e293b;--muted:#64748b;--muted2:#94a3b8;
  --bg:#f6f8fc;--surface:#fff;--line:#e6ecf6;--line2:#eef2f9;--line3:#f1f5f9;
  --sh:0 1px 2px rgba(15,23,42,.04),0 8px 24px -12px rgba(15,23,42,.12);
  --sh-sm:0 1px 2px rgba(15,23,42,.05);--sh-lg:0 18px 48px -16px rgba(15,23,42,.18);
  --r:16px;--r-sm:11px;--r-lg:22px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;font-size:14px;line-height:1.5}
h1,h2,h3,h4{font-family:'Outfit',sans-serif;color:var(--ink)}
svg{pointer-events:none}a{color:var(--b1);text-decoration:none}

/* ═══════════════════════════════════════════════════════════ */
/* LOGIN                                                       */
/* ═══════════════════════════════════════════════════════════ */
.login{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(120% 80% at 100% 0%,rgba(29,78,216,.15),transparent 50%),radial-gradient(80% 60% at 0% 100%,rgba(6,182,212,.12),transparent 50%),#eef2fb}
.login::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60' viewBox='0 0 60 60'><circle cx='1' cy='1' r='1' fill='%231d4ed8' fill-opacity='.06'/></svg>");pointer-events:none}
.login-card{position:relative;background:#fff;border-radius:24px;box-shadow:0 32px 80px -24px rgba(15,23,42,.22);max-width:440px;width:100%;padding:36px 34px 30px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
.login-logo{width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,#2563eb,#1e3a8a);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Outfit';font-weight:800;font-size:26px;margin-bottom:18px;box-shadow:0 12px 28px -10px rgba(29,78,216,.5)}
.login h1{font-size:23px;font-weight:800;margin-bottom:5px;letter-spacing:-.02em}
.login-sub{color:var(--muted);font-size:13.5px;margin-bottom:24px}
.login-step{display:none;animation:fadeIn .25s ease}.login-step.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
.input-grp{position:relative;margin-bottom:14px}
.input-grp svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.input-l{display:block;font-family:'Outfit';font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;margin-bottom:6px;padding-left:2px}
.input-l b{color:var(--b1)}
.in{width:100%;padding:14px 16px 14px 46px;border:1.5px solid var(--line);border-radius:13px;background:#fafbff;font-family:inherit;font-size:14.5px;color:var(--ink);transition:.15s}
.in:focus{outline:none;border-color:var(--b1);background:#fff;box-shadow:0 0 0 4px rgba(29,78,216,.1)}
.in-code{padding-left:18px;text-align:center;font-family:'Outfit';font-weight:800;font-size:24px;letter-spacing:14px;color:var(--b2)}
.login-btn{width:100%;border:none;background:linear-gradient(135deg,#2563eb,#1e3a8a);color:#fff;font-family:'Outfit';font-weight:700;font-size:14.5px;padding:14px;border-radius:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 12px 26px -10px rgba(29,78,216,.55);transition:.15s;margin-top:6px}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 16px 30px -10px rgba(29,78,216,.6)}
.login-btn:disabled{opacity:.6;cursor:wait}
.login-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.login-back{background:none;border:none;color:var(--muted);font-family:'Outfit';font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:7px 0;margin-top:8px}
.login-back:hover{color:var(--b1)}
.login-msg{padding:11px 14px;border-radius:11px;font-size:12.5px;margin-bottom:14px;display:none;align-items:flex-start;gap:8px;line-height:1.5}
.login-msg.on{display:flex}
.login-msg.err{background:var(--bad-soft);color:#991b1b;border:1px solid #fecaca}
.login-msg.ok{background:var(--ok-soft);color:#15803d;border:1px solid #bbf7d0}
.login-foot{margin-top:22px;text-align:center;font-size:11.5px;color:var(--muted2)}
.login-foot b{color:var(--b1);letter-spacing:.6px;font-weight:800}

/* ═══════════════════════════════════════════════════════════ */
/* SHELL                                                       */
/* ═══════════════════════════════════════════════════════════ */
.shell{display:none;min-height:100vh;display:flex;overflow:hidden}
.shell.on{display:flex}
.sidebar{width:232px;flex-shrink:0;background:#fff;height:100vh;display:flex;flex-direction:column;border-right:1px solid var(--line);z-index:20;transition:.2s}
.sb-brand{padding:22px 18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line2)}
.sb-logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#2563eb,#1e3a8a);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Outfit';font-weight:800;font-size:16px;flex-shrink:0}
.sb-brand b{font-family:'Outfit';font-weight:800;font-size:13px;letter-spacing:3.5px;color:var(--ink);display:block;line-height:1}
.sb-brand span{font-size:11px;color:var(--muted);margin-top:3px;display:block}
.sb-nav{padding:14px 12px;display:flex;flex-direction:column;gap:1px;flex:1;overflow-y:auto}
.sb-sep{font-family:'Outfit';font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted2);padding:14px 10px 6px;font-weight:700}
.sbi{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;cursor:pointer;transition:.12s;color:var(--ink2);font-family:'Outfit';font-weight:600;font-size:13px;border:none;background:none;width:100%;text-align:left;position:relative}
.sbi:hover{background:var(--line3);color:var(--b1)}
.sbi.on{background:linear-gradient(135deg,#2563eb,#1e3a8a);color:#fff;font-weight:700;box-shadow:0 6px 16px -8px rgba(29,78,216,.5)}
.sbi svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sbi .b-cnt{margin-left:auto;background:#fff;color:var(--b1);font-size:10px;font-weight:800;padding:1px 7px;border-radius:20px;min-width:22px;text-align:center}
.sbi:not(.on) .b-cnt{background:var(--line3);color:var(--muted)}
.sbi.alert .b-cnt{background:var(--bad);color:#fff}
.sb-foot{padding:14px 18px;border-top:1px solid var(--line2);font-size:11px;color:var(--muted)}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--line3);border-radius:11px;margin-bottom:8px}
.sb-user-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#1e3a8a);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Outfit';font-weight:700;font-size:13px;flex-shrink:0}
.sb-user-i{flex:1;min-width:0;font-family:'Outfit'}
.sb-user-i b{font-size:11.5px;font-weight:700;display:block;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-i span{font-size:10px;color:var(--muted)}
.sb-out{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.sb-out:hover{background:var(--bad-soft);color:var(--bad)}
.sb-out svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.refresh-badge{display:inline-flex;align-items:center;gap:6px;background:var(--ok-soft);color:#15803d;font-family:'Outfit';font-weight:700;font-size:10.5px;padding:3px 9px;border-radius:20px}
.pulse{width:7px;height:7px;border-radius:50%;background:#16a34a;animation:pulse 2s infinite}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--line2);padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0;z-index:10}
.tb-title{flex:1;min-width:170px}
.tb-title h2{font-family:'Outfit';font-weight:800;font-size:18px;color:var(--ink);letter-spacing:-.01em;line-height:1.2}
.tb-title span{font-size:11.5px;color:var(--muted);display:block;margin-top:2px}
.fil-bar{display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end}
.fil{display:flex;flex-direction:column;gap:3px}
.fil label{font-family:'Outfit';font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700}
.fil select,.fil input[type=date]{border:1.5px solid var(--line);border-radius:9px;padding:6px 10px;font-family:'Inter';font-size:12.5px;color:var(--ink);background:#fff;min-width:120px;cursor:pointer;transition:.12s}
.fil select:focus,.fil input:focus{outline:none;border-color:var(--b1);box-shadow:0 0 0 3px rgba(29,78,216,.1)}
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:9px;font-family:'Outfit';font-weight:700;font-size:12.5px;padding:8px 13px;cursor:pointer;transition:.12s;border:1.5px solid var(--line);background:#fff;color:var(--ink2);white-space:nowrap}
.btn:hover{border-color:var(--b1);color:var(--b1)}
.btn.pri{background:linear-gradient(135deg,#2563eb,#1e3a8a);color:#fff;border:none;box-shadow:0 6px 18px -8px rgba(29,78,216,.55)}
.btn.pri:hover{transform:translateY(-1px);color:#fff}
.btn.danger{color:#dc2626;border-color:#fecaca}.btn.danger:hover{background:var(--bad-soft);color:#991b1b}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.content{flex:1;overflow-y:auto;padding:22px 24px 50px}

/* ═══════════════════════════════════════════════════════════ */
/* CARDS / KPI                                                 */
/* ═══════════════════════════════════════════════════════════ */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:#fff;border:1px solid var(--line2);border-radius:14px;padding:14px 15px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden;animation:slideUp .35s ease both;transition:.15s}
.kpi:hover{border-color:var(--line);box-shadow:var(--sh)}
.kpi-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.kpi-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-ic svg{width:17px;height:17px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.kpi-trend{font-family:'Outfit';font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
.kpi-trend.up{background:var(--ok-soft);color:#15803d}
.kpi-trend.down{background:var(--bad-soft);color:#991b1b}
.kpi-trend.neutral{background:var(--line3);color:var(--muted)}
.kpi-val{font-family:'Outfit';font-weight:800;font-size:22px;color:var(--ink);line-height:1.05;letter-spacing:-.02em}
.kpi-lbl{font-size:11.5px;color:var(--muted);font-weight:500;line-height:1.3}
.kpi-sub{font-size:10.5px;color:var(--muted2);font-family:'Outfit';font-weight:600;margin-top:1px}
.ic-blue{background:#dbeafe;color:#1d4ed8}
.ic-green{background:#dcfce7;color:#15803d}
.ic-red{background:#fee2e2;color:#b91c1c}
.ic-orange{background:#ffedd5;color:#c2410c}
.ic-purple{background:#ede9fe;color:#6d28d9}
.ic-pink{background:#fce7f3;color:#be185d}
.ic-cyan{background:#cffafe;color:#0e7490}
.ic-teal{background:#ccfbf1;color:#0f766e}
.ic-amber{background:#fef3c7;color:#a16207}

/* Cards */
.card{background:#fff;border:1px solid var(--line2);border-radius:var(--r);padding:18px;animation:slideUp .4s ease both}
.card.alert{border-left:3px solid var(--bad)}
.card.warn{border-left:3px solid var(--warn)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.card-h h3{font-size:14px;font-weight:700;color:var(--ink);line-height:1.2;display:flex;align-items:center;gap:8px}
.card-h h3 svg{width:16px;height:16px;stroke:var(--b1);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.card-h .tag{font-family:'Outfit';font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;background:var(--line3);padding:3px 9px;border-radius:20px;white-space:nowrap}
.card-h .tag.ok{background:var(--ok-soft);color:#15803d}
.card-h .tag.alert{background:var(--bad-soft);color:#991b1b}
.card-h .tag.warn{background:var(--warn-soft);color:#92400e}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.g23{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
.g32{display:grid;grid-template-columns:1fr 2fr;gap:14px;margin-bottom:14px}
.h300{height:300px;position:relative}.h260{height:260px;position:relative}.h240{height:240px;position:relative}.h200{height:200px;position:relative}.h160{height:160px;position:relative}

/* Tabla */
.tw{overflow-x:auto;max-height:380px;overflow-y:auto;border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead{position:sticky;top:0;background:#fff;z-index:1}
thead th{font-family:'Outfit';font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;padding:10px 11px;border-bottom:1.5px solid var(--line);text-align:left;white-space:nowrap;background:#fff}
th.r,td.r{text-align:right}
tbody td{padding:10px 11px;border-bottom:1px solid var(--line2);color:var(--ink);vertical-align:middle}
tbody tr:hover{background:#fafbff}
.pill{display:inline-flex;align-items:center;gap:4px;font-family:'Outfit';font-weight:700;font-size:10.5px;padding:2px 9px;border-radius:20px}
.pill.ok{background:var(--ok-soft);color:#15803d}.pill.bad{background:var(--bad-soft);color:#991b1b}.pill.warn{background:var(--warn-soft);color:#92400e}.pill.info{background:#dbeafe;color:#1d4ed8}
.empty{text-align:center;color:var(--muted);padding:32px;font-size:13px}

/* Top list */
.tl{display:flex;flex-direction:column;gap:8px}
.tr2{display:flex;align-items:center;gap:10px}
.rk{width:24px;height:24px;border-radius:7px;background:var(--line3);color:var(--b1);font-family:'Outfit';font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rk.g1{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.rk.g2{background:linear-gradient(135deg,#9ca3af,#64748b);color:#fff}
.rk.g3{background:linear-gradient(135deg,#cd7c43,#92400e);color:#fff}
.tr2 .nm{flex:1;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.tr2 .bar{height:6px;border-radius:4px;background:linear-gradient(90deg,#2563eb,#06b6d4);min-width:6px}
.tr2 .vl{font-family:'Outfit';font-weight:700;font-size:12.5px;color:var(--ink);min-width:62px;text-align:right;flex-shrink:0}

/* Team cards */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:14px}
.mc{background:#fff;border:1px solid var(--line2);border-radius:var(--r);padding:18px;display:flex;flex-direction:column;gap:12px;animation:slideUp .35s ease both;transition:.15s}
.mc:hover{border-color:var(--line);box-shadow:var(--sh)}
.mc-top{display:flex;align-items:center;gap:12px}
.mc-av{width:54px;height:54px;border-radius:50%;object-fit:cover;flex-shrink:0;border:3px solid #fff;box-shadow:0 0 0 1.5px var(--line)}
.mc-avd{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#1e3a8a);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Outfit';font-weight:800;font-size:19px;flex-shrink:0}
.mc-name{font-family:'Outfit';font-weight:800;font-size:14.5px;color:var(--ink)}
.mc-sub{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px}
.mc-sub svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}
.mc-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.mk{background:#fafbff;border:1px solid var(--line2);border-radius:10px;padding:8px 6px;text-align:center}
.mk b{font-family:'Outfit';font-weight:800;font-size:14px;color:var(--b1);display:block;line-height:1.1}
.mk span{font-size:10px;color:var(--muted);font-weight:500}
.mc-stats{display:flex;flex-direction:column;gap:6px;padding-top:8px;border-top:1px dashed var(--line)}
.mc-stat{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
.mc-stat svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.mc-stat b{color:var(--ink);font-family:'Outfit';font-weight:700}

/* Heatmap */
.hm-wrap{overflow-x:auto}
.hm-head{display:flex;gap:3px;margin-left:38px;margin-bottom:3px}
.hm-head span{flex:1;text-align:center;font-size:9.5px;color:var(--muted);font-family:'Outfit';font-weight:700;min-width:0}
.hm{display:flex;flex-direction:column;gap:3px}
.hm-row{display:flex;gap:3px;align-items:center}
.hm-lbl{width:34px;font-size:10px;color:var(--muted);text-align:right;padding-right:6px;flex-shrink:0;font-family:'Outfit';font-weight:700}
.hm-cell{flex:1;height:28px;border-radius:5px;background:var(--line3);display:flex;align-items:center;justify-content:center;font-family:'Outfit';font-weight:700;font-size:10.5px;cursor:default;transition:.15s;min-width:0}
.hm-cell:hover{transform:scale(1.12);z-index:5;position:relative;box-shadow:var(--sh)}

/* Estado */
.state{background:#fff;border:1px solid var(--line2);border-radius:var(--r);padding:80px 24px;text-align:center}
.spin{width:46px;height:46px;border:4px solid #dbeafe;border-top-color:var(--b1);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
.state h3{font-family:'Outfit';color:var(--ink);font-size:17px;margin-bottom:7px}
.state p{color:var(--muted);font-size:13px}

/* Galería */
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.gal-card{background:#fff;border:1px solid var(--line2);border-radius:var(--r);overflow:hidden;transition:.18s;animation:slideUp .35s ease both;cursor:pointer}
.gal-card:hover{transform:translateY(-2px);box-shadow:var(--sh-lg);border-color:var(--line)}
.gal-imgs{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--line2)}
.gal-img{position:relative;aspect-ratio:1/1;overflow:hidden;background:var(--line3)}
.gal-img img{width:100%;height:100%;object-fit:cover;display:block;transition:.3s}
.gal-card:hover .gal-img img{transform:scale(1.04)}
.gal-img span{position:absolute;left:8px;top:8px;background:rgba(11,21,56,.85);color:#fff;font-family:'Outfit';font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px;backdrop-filter:blur(4px)}
.gal-img .ph{display:flex;align-items:center;justify-content:center;color:var(--muted2);font-size:11.5px;height:100%}
.gal-info{padding:14px 15px}
.gal-info b{font-family:'Outfit';font-size:13px;display:block;color:var(--ink);font-weight:700}
.gal-info .gal-sub{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
.gal-info .gal-merc{font-size:11px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:6px;padding-top:8px;border-top:1px dashed var(--line)}
.gal-info .gal-merc svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(11,21,56,.92);z-index:300;display:none;align-items:center;justify-content:center;padding:30px;backdrop-filter:blur(6px)}
.lb.on{display:flex;animation:fadeIn .25s}
.lb-box{max-width:1100px;width:100%;background:#fff;border-radius:18px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;gap:0;box-shadow:0 30px 80px rgba(0,0,0,.5);max-height:90vh}
.lb-pic{position:relative;background:#000;display:flex;align-items:center;justify-content:center;min-height:300px;max-height:90vh}
.lb-pic img{max-width:100%;max-height:90vh;display:block;object-fit:contain}
.lb-pic span{position:absolute;left:14px;top:14px;background:rgba(255,255,255,.95);color:var(--ink);font-family:'Outfit';font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:5px 11px;border-radius:20px}
.lb-pic .lb-ph{color:var(--muted);padding:60px;text-align:center}
.lb-close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;background:rgba(11,21,56,.85);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;backdrop-filter:blur(6px)}
.lb-close svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5}
.lb-close:hover{background:var(--bad)}
@media(max-width:760px){.lb-box{grid-template-columns:1fr;max-height:95vh;overflow-y:auto}.lb-pic{max-height:50vh}}

/* Línea de tiempo */
.tlw{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line2)}
.tl-item:last-child{border-bottom:none}
.tl-dot-col{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0}
.tl-dot{width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#1e3a8a);flex-shrink:0;margin-top:3px;box-shadow:0 0 0 3px var(--line3)}
.tl-line{flex:1;width:2px;background:var(--line);margin-top:3px}
.tl-body{flex:1;min-width:0}
.tl-head{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
.tl-name{font-family:'Outfit';font-weight:800;font-size:13.5px;color:var(--ink)}
.tl-dur{font-family:'Outfit';font-weight:700;font-size:11px;color:var(--b1);background:var(--line3);padding:3px 10px;border-radius:20px;white-space:nowrap}
.tl-meta{font-size:11.5px;color:var(--muted);margin-top:4px}
.tl-mods{font-size:10.5px;color:var(--muted2);margin-top:6px;line-height:1.6}
.tl-mods b{color:var(--b1);background:#dbeafe;padding:1px 7px;border-radius:6px;font-weight:700;margin:0 2px}

/* Alert banner */
.alert-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border-left:3px solid var(--warn);border-radius:12px;padding:13px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;animation:slideUp .35s ease}
.alert-banner.bad{background:linear-gradient(135deg,#fee2e2,#fecaca);border-left-color:var(--bad)}
.alert-banner svg{width:20px;height:20px;flex-shrink:0;stroke:var(--warn);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.alert-banner.bad svg{stroke:var(--bad)}
.alert-banner b{font-family:'Outfit';font-weight:800;display:block;color:var(--ink);font-size:13.5px}
.alert-banner span{font-size:12px;color:var(--ink2)}

/* Severity bars (agotados / fechas) */
.sev-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;margin-bottom:5px;background:var(--line3);transition:.15s}
.sev-row:hover{background:#eef2ff}
.sev-row.crit{background:var(--bad-soft);border-left:3px solid var(--bad)}
.sev-row.warn{background:var(--warn-soft);border-left:3px solid var(--warn)}
.sev-row.info{background:#dbeafe;border-left:3px solid var(--b1)}
.sev-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Outfit';font-weight:800;font-size:11px}
.sev-row.crit .sev-ic{background:var(--bad);color:#fff}
.sev-row.warn .sev-ic{background:var(--warn);color:#fff}
.sev-row.info .sev-ic{background:var(--b1);color:#fff}
.sev-content{flex:1;min-width:0}
.sev-name{font-family:'Outfit';font-weight:700;font-size:12.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sev-meta{font-size:11px;color:var(--muted);margin-top:1px}
.sev-val{font-family:'Outfit';font-weight:800;font-size:13px;color:var(--ink);text-align:right;flex-shrink:0;min-width:80px}

@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

@media print{
  .sidebar,.topbar{display:none!important}
  .main,.content{height:auto;overflow:visible}
  .content{padding:10px}
  .card{box-shadow:none;border:1px solid var(--line);page-break-inside:avoid}
  body{background:#fff}
}

@media(max-width:1080px){.g23,.g32{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:820px){
  .sidebar{width:66px}
  .sb-brand span,.sbi span:not(svg),.sb-sep,.sb-user-i,.sb-foot .refresh-badge{display:none}
  .sbi{justify-content:center;padding:13px}
  .sb-user{justify-content:center;padding:8px}.sb-out{display:none}
  .g2{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:520px){.kpis{grid-template-columns:1fr}.content{padding:16px;padding-bottom:50px}.topbar{padding:12px 16px}}

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG — URL de la implementación de DashboardV2.gs
// ═══════════════════════════════════════════════════════════
const DASH_URL = 'https://script.google.com/macros/s/AKfycbw6gtyJBa1_JcXlsJMhgWc7QRBqGoGDMwlBW8keirJNa919quiV8iBB1EBv4wIWlbYD3Q/exec';
const LS_SESSION = 'pqp_dash_session_v2';

let TODOS = [], SKUS = [], SKU_MAP = {}, VISTA = 'visitas', CH = {};
let F = { merc:'', ciudad:'', desde:'', hasta:'', mes:'', anio:'' };
let SESSION = null, rTimer = null, rMins = 60;

const TITULOS = {
  visitas:'Visitas',resumen:'Resumen General',equipo:'Equipo en Campo',
  ventas:'Ventas',sugerido:'Sugerido / Pedidos',chequeo:'Chek de Precios',
  inventario:'Inventario',agotados:'Agotados',fechas:'Fechas Cortas',
  muestraspop:'Muestras y Material POP',galeria:'Galería Antes / Después'
};
const SUBS = {
  visitas:'Trazabilidad de visitas, tiempos y cobertura territorial',
  resumen:'Vista ejecutiva de toda la operación',
  equipo:'Mercaderistas, fotos y desempeño',
  ventas:'Conversión, valor monetizado y análisis comercial',
  sugerido:'Pedidos sugeridos al cliente',
  chequeo:'Comparativo de precios propios y de competencia',
  inventario:'Stock en estante y exhibiciones',
  agotados:'Productos sin stock — alertas y patrones',
  fechas:'Productos próximos a vencer — alertas por días',
  muestraspop:'Muestras entregadas y material POP',
  galeria:'Registro fotográfico antes y después'
};
const COLORES = ['#1d4ed8','#06b6d4','#7c3aed','#0d9488','#f97316','#db2777','#d97706','#dc2626','#16a34a','#0ea5e9'];

// ═══════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════
function msg(t, ok) { const el=document.getElementById('lMsg'); el.textContent=t; el.className='login-msg on '+(ok?'ok':'err'); }
function clearMsg(){ document.getElementById('lMsg').classList.remove('on'); }
function paso(n) {
  document.querySelectorAll('.login-step').forEach(e=>e.classList.remove('on'));
  document.getElementById('step'+n).classList.add('on');
  clearMsg();
}
function volverEmail(){ paso(1); document.getElementById('loginEmail').focus(); }

async function solicitarCodigo() {
  const email=document.getElementById('loginEmail').value.trim().toLowerCase();
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ msg('Ingresa un correo válido.'); return; }
  const b=document.getElementById('btnEnviar'); b.disabled=true; b.querySelector('span').textContent='Enviando...';
  try{
    const r=await fetch(DASH_URL+'?action=solicitarToken&email='+encodeURIComponent(email),{redirect:'follow'});
    const d=await r.json();
    if(!d.success){ msg(d.error||'No se pudo enviar el código.'); b.disabled=false; b.querySelector('span').textContent='Enviar código al correo'; return; }
    document.getElementById('lEmail').textContent=email;
    paso(2);
    setTimeout(()=>document.getElementById('loginToken').focus(),100);
  }catch(e){ msg('Sin conexión: '+e.message); }
  b.disabled=false; b.querySelector('span').textContent='Enviar código al correo';
}

async function validarCodigo() {
  const email=document.getElementById('lEmail').textContent;
  const token=document.getElementById('loginToken').value.trim();
  if(!token||token.length<4){ msg('Ingresa el código que llegó a tu correo.'); return; }
  const b=document.getElementById('btnEntrar'); b.disabled=true; b.querySelector('span').textContent='Validando...';
  try{
    const r=await fetch(DASH_URL+'?action=validarToken&email='+encodeURIComponent(email)+'&token='+encodeURIComponent(token),{redirect:'follow'});
    const d=await r.json();
    if(!d.success){ msg(d.error||'Código incorrecto.'); b.disabled=false; b.querySelector('span').textContent='Ingresar al dashboard'; return; }
    SESSION={ session:d.session, email:d.email, exp:d.expira };
    localStorage.setItem(LS_SESSION,JSON.stringify(SESSION));
    msg('¡Bienvenido!',true);
    setTimeout(entrarShell,400);
  }catch(e){ msg('Sin conexión: '+e.message); b.disabled=false; b.querySelector('span').textContent='Ingresar al dashboard'; }
}

document.getElementById('loginEmail').addEventListener('keypress',e=>{ if(e.key==='Enter') solicitarCodigo(); });
document.getElementById('loginToken').addEventListener('input',e=>{ e.target.value=e.target.value.replace(/\D/g,'').slice(0,6); });

// ═══════════════════════════════════════════════════════════
// CARGA Y AUTO-REFRESH
// ═══════════════════════════════════════════════════════════
async function cargar() {
  set('<div class="state"><div class="spin"></div><h3>Cargando datos…</h3><p>Consultando la hoja Registros</p></div>');
  try {
    const r = await fetch(DASH_URL+'?action=datos&session='+encodeURIComponent(SESSION?SESSION.session:''),{redirect:'follow'});
    const d = await r.json();
    if (d.reauth) { logout(); return; }
    if (!d.success) { set('<div class="state"><h3>Error al cargar</h3><p>'+(d.error||'')+'</p></div>'); return; }
    SKUS = d.skus||[];
    SKU_MAP={}; SKUS.forEach(s=>{ SKU_MAP[s.sku]={precio:s.precio||0, categoria:s.categoria||''}; });
    TODOS = (d.registros||[]).map(norm);
    actualizarBadges();
    pintarFiltros();
    render();
    autoRefresh();
  } catch(e) {
    set('<div class="state"><h3>Sin conexión</h3><p>Verifica la URL del DashboardV2.gs · '+e.message+'</p></div>');
  }
}
function autoRefresh() {
  clearInterval(rTimer);
  let m = rMins;
  document.getElementById('rTxt').textContent='Auto '+m+' min';
  rTimer = setInterval(()=>{
    m--;
    document.getElementById('rTxt').textContent=m>0?'Auto '+m+' min':'Actualizando…';
    if(m<=0){ cargar(); m=rMins; }
  },60000);
}

// ═══════════════════════════════════════════════════════════
// HELPERS / NORMALIZACIÓN
// ═══════════════════════════════════════════════════════════
function norm(r) {
  r.fecha = r.timestamp ? new Date(r.timestamp) : null;
  r.fechaInicio = r.horaInicio ? new Date(r.horaInicio) : r.fecha;
  r.duracionMs = (r.fecha && r.fechaInicio) ? Math.max(0, r.fecha - r.fechaInicio) : 0;
  r.totalPedido = num(r.pedidoTotalFinal);
  r.numProductos = (r.pedidoProductos||[]).length;
  r.tieneVenta = r.ventaRealizada === 'Si';
  r.tienePedido = r.numProductos > 0;
  r.numMuestras = (r.muestrasProductos||[]).length;
  r.numPOPEntregado = (r.materialPOPEntregado||[]).length;
  r.chequeos = (r.chequeoPrecios||[]);
  r.chequeosOk = r.chequeos.filter(c=>c.dentroDelRango===true||c.dentroDelRango==='true').length;
  r.chequeosFuera = r.chequeos.length - r.chequeosOk;
  // Calcular valor venta usando precios SKU
  r.valorVenta = (r.ventaProductos||[]).reduce((s,p)=>{ const ref=SKU_MAP[p.sku]; const pr=ref?ref.precio:0; return s + pr*(num(p.cantidad)||0); },0);
  if (r.fecha) { r.hora = r.fecha.getHours(); r.dow = r.fecha.getDay(); r.anio = r.fecha.getFullYear(); r.mes = r.fecha.getMonth()+1; }
  return r;
}
function num(v) { const n=parseFloat(String(v||'').replace(/[^0-9.-]/g,'')); return isNaN(n)?0:n; }
function fmt(n) { return '$'+Number(n||0).toLocaleString('es-CO',{maximumFractionDigits:0}); }
function fN(n) { return Number(n||0).toLocaleString('es-CO'); }
function esc(s) { return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function ini(n) { return String(n||'?').trim().split(/\s+/).slice(0,2).map(p=>p[0]||'').join('').toUpperCase(); }
function dImg(u, sz) { const m=String(u||'').match(/[-\w]{25,}/); return m?'https://drive.google.com/thumbnail?id='+m[0]+'&sz=w'+(sz||500):''; }
function hhmm(ms) { if(!ms) return '—'; const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000); return h?h+'h '+m+'m':m+'m'; }
function diasHasta(dStr) { if(!dStr) return null; const d=new Date(dStr); if(isNaN(d.getTime())) return null; return Math.ceil((d-new Date())/86400000); }
function set(html) { destroyCharts(); document.getElementById('content').innerHTML = html; }
function destroyCharts() { Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}}); CH={}; }

function actualizarBadges(){
  const totAg = TODOS.reduce((s,r)=>s+(r.agotados||[]).length,0);
  const totFc = TODOS.reduce((s,r)=>s+(r.fechasCortas||[]).length,0);
  const elAg=document.getElementById('bAg'), elFc=document.getElementById('bFc');
  elAg.textContent=totAg; elFc.textContent=totFc;
  // Alerta visual si hay próximos a vencer en menos de 7 días
  let critFc=0;
  TODOS.forEach(r=>(r.fechasCortas||[]).forEach(f=>{ const d=diasHasta(f.vence); if(d!=null&&d<=7) critFc++; }));
  document.querySelector('.sbi[data-v="fechas"]').classList.toggle('alert', critFc>0);
  document.querySelector('.sbi[data-v="agotados"]').classList.toggle('alert', totAg>5);
}

function pintarFiltros() {
  const mercs = [...new Set(TODOS.map(r=>r.nombre).filter(Boolean))].sort();
  const ciu = [...new Set(TODOS.map(r=>r.ciudad).filter(Boolean))].sort();
  const anios = [...new Set(TODOS.filter(r=>r.anio).map(r=>r.anio))].sort();
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  document.getElementById('filtros').innerHTML = `
    <div class="fil"><label>Mercaderista</label>
      <select onchange="setF('merc',this.value)"><option value="">Todos</option>${mercs.map(m=>`<option${m===F.merc?' selected':''}>${esc(m)}</option>`).join('')}</select>
    </div>
    <div class="fil"><label>Ciudad</label>
      <select onchange="setF('ciudad',this.value)"><option value="">Todas</option>${ciu.map(c=>`<option${c===F.ciudad?' selected':''}>${esc(c)}</option>`).join('')}</select>
    </div>
    <div class="fil"><label>Año</label>
      <select onchange="setF('anio',this.value)"><option value="">Todos</option>${anios.map(a=>`<option${String(a)===String(F.anio)?' selected':''}>${a}</option>`).join('')}</select>
    </div>
    <div class="fil"><label>Mes</label>
      <select onchange="setF('mes',this.value)"><option value="">Todos</option>${meses.map((m,i)=>`<option value="${i+1}"${String(i+1)===String(F.mes)?' selected':''}>${m}</option>`).join('')}</select>
    </div>
    <div class="fil"><label>Desde</label><input type="date" value="${F.desde}" onchange="setF('desde',this.value)"></div>
    <div class="fil"><label>Hasta</label><input type="date" value="${F.hasta}" onchange="setF('hasta',this.value)"></div>
    <button class="btn danger" onclick="limpiarF()" style="align-self:flex-end"><svg><use href="#i-xc"/></svg>Limpiar</button>`;
}
function setF(k,v) { F[k]=v; render(); }
function limpiarF() { F={merc:'',ciudad:'',desde:'',hasta:'',mes:'',anio:''}; pintarFiltros(); render(); }
function setV(v) {
  VISTA = v;
  document.querySelectorAll('.sbi').forEach(el=>el.classList.toggle('on',el.dataset.v===v));
  document.querySelector('#tbTitle h2').textContent = TITULOS[v]||v;
  render();
}
function filtrar() {
  return TODOS.filter(r=>{
    if(F.merc && r.nombre!==F.merc) return false;
    if(F.ciudad && r.ciudad!==F.ciudad) return false;
    if(F.anio && r.anio!=F.anio) return false;
    if(F.mes && r.mes!=F.mes) return false;
    if(F.desde && r.fecha && r.fecha<new Date(F.desde)) return false;
    if(F.hasta && r.fecha && r.fecha>new Date(F.hasta+'T23:59:59')) return false;
    return true;
  });
}

function render() {
  destroyCharts();
  const d = filtrar();
  document.getElementById('tbSub').textContent = (SUBS[VISTA]||'')+' · '+d.length+' gestiones · '+new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  const cont = document.getElementById('content');
  if (!d.length && TODOS.length) { cont.innerHTML='<div class="state"><h3>Sin datos para el filtro</h3><p>Ajusta los segmentadores.</p></div>'; return; }
  const views = {visitas:vVisitas,resumen:vResumen,equipo:vEquipo,ventas:vVentas,sugerido:vSugerido,chequeo:vChequeo,inventario:vInventario,agotados:vAgotados,fechas:vFechas,muestraspop:vMuestrasPop,galeria:vGaleria};
  (views[VISTA]||vVisitas)(cont, d);
}

// ── Componentes UI ──
function kpi(icCls,ic,val,lbl,sub,trend) {
  const tr = trend ? `<span class="kpi-trend ${trend.cls||'neutral'}">${trend.txt}</span>` : '';
  return `<div class="kpi">
    <div class="kpi-top"><div class="kpi-ic ${icCls}"><svg><use href="#${ic}"/></svg></div>${tr}</div>
    <div class="kpi-val">${val}</div>
    <div class="kpi-lbl">${lbl}</div>
    ${sub?`<div class="kpi-sub">${sub}</div>`:''}
  </div>`;
}
function card(h,tag,body,extraCls) { return `<div class="card ${extraCls||''}"><div class="card-h"><h3>${h}</h3>${tag?(typeof tag==='string'?`<span class="tag">${tag}</span>`:`<span class="tag ${tag.cls||''}">${tag.txt}</span>`):''}</div>${body}</div>`; }
function topList(d, campo, porFrec, max=10) {
  const m={};
  d.forEach(r=>(r[campo]||[]).forEach(p=>{ const k=p.sku||p.producto||p.nombre||'—'; m[k]=(m[k]||0)+(porFrec?1:num(p.cantidad)||1); }));
  const e=Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,max);
  if(!e.length) return '<div class="empty">Sin datos</div>';
  const mx=Math.max(...e.map(x=>x[1]));
  return '<div class="tl">'+e.map(([k,v],i)=>`<div class="tr2"><div class="rk${i===0?' g1':i===1?' g2':i===2?' g3':''}">${i+1}</div><div class="nm">${esc(k)}</div><div class="bar" style="width:${Math.round(v/mx*90)+8}px"></div><div class="vl">${fN(v)}</div></div>`).join('')+'</div>';
}
function baseOpts(sc,noLeg) {
  return {responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:!noLeg,position:'bottom',labels:{font:{family:'Inter',size:11.5},usePointStyle:true,boxWidth:8,padding:14}}},
    scales:Object.assign({x:{grid:{display:false},ticks:{font:{family:'Inter',size:11},color:'#94a3b8'}}},sc)};
}
function porDia(d) {
  const m={};
  d.forEach(r=>{ if(!r.fecha)return; const k=r.fecha.toISOString().slice(0,10); if(!m[k])m[k]={g:0,v:0,vts:0}; m[k].g++; m[k].v+=r.totalPedido; if(r.tieneVenta)m[k].vts++; });
  const k=Object.keys(m).sort();
  return {labels:k,gest:k.map(x=>m[x].g),val:k.map(x=>m[x].v),vts:k.map(x=>m[x].vts)};
}
function reg(y) {
  const n=y.length; if(n<2)return y.slice();
  let sx=0,sy=0,sxy=0,sxx=0;
  for(let i=0;i<n;i++){sx+=i;sy+=y[i];sxy+=i*y[i];sxx+=i*i;}
  const m2=(n*sxy-sx*sy)/(n*sxx-sx*sx||1),b=(sy-m2*sx)/n;
  return y.map((_,i)=>Math.max(0,m2*i+b));
}

// ═══════════════════════════════════════════════════════════
// 1. VISITAS (primer módulo)
// ═══════════════════════════════════════════════════════════
function vVisitas(cont,d) {
  const pdvs=new Set(d.map(r=>r.pdv).filter(Boolean)).size;
  const cius=new Set(d.map(r=>r.ciudad).filter(Boolean)).size;
  const mercs=new Set(d.map(r=>r.nombre).filter(Boolean)).size;
  const hoy=new Date().toDateString();
  const vHoy=d.filter(r=>r.fecha&&r.fecha.toDateString()===hoy).length;
  const durVal=d.filter(r=>r.duracionMs>0);
  const durProm=durVal.length?durVal.reduce((s,r)=>s+r.duracionMs,0)/durVal.length:0;
  const durMax=durVal.length?Math.max(...durVal.map(r=>r.duracionMs)):0;
  const conFotos=d.filter(r=>r.fotoAntes||r.fotoDespues).length;
  const conGPS=d.filter(r=>r.lat&&r.lng).length;

  // Heatmap
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const bloques=['6a','7a','8a','9a','10a','11a','12p','1p','2p','3p','4p','5p','6p','7p','8p+'];
  const grid=Array.from({length:7},()=>Array(15).fill(0));
  d.forEach(r=>{ if(r.hora==null||r.dow==null) return; const hi=Math.min(Math.max(r.hora-6,0),14); grid[r.dow][hi]++; });
  const maxHM=Math.max(1,...grid.flat());
  const hmHtml=`<div class="hm-wrap">
    <div class="hm-head">${bloques.map(b=>`<span>${b}</span>`).join('')}</div>
    <div class="hm">${dias.map((dia,i)=>`<div class="hm-row"><div class="hm-lbl">${dia}</div>${grid[i].map((v,j)=>{ const pct=v/maxHM; const bg=v?`rgba(29,78,216,${0.12+pct*.78})`:'#f1f5f9'; const col=pct>0.55?'#fff':'#94a3b8'; return `<div class="hm-cell" title="${dia} ${bloques[j]}: ${v} visitas" style="background:${bg};color:${col}">${v||''}</div>`; }).join('')}</div>`).join('')}</div></div>`;

  // Línea de tiempo
  const recientes=d.slice().sort((a,b)=>(b.fecha||0)-(a.fecha||0)).slice(0,20);
  const tlHtml=recientes.length?'<div class="tlw">'+recientes.map((r,i)=>{
    const mods=(r.modulosGuardados||'').split(',').filter(Boolean).map(m=>'<b>'+esc(m.trim())+'</b>').join(' → ');
    return `<div class="tl-item">
      <div class="tl-dot-col"><div class="tl-dot"></div>${i<recientes.length-1?'<div class="tl-line"></div>':''}</div>
      <div class="tl-body">
        <div class="tl-head"><span class="tl-name">${esc(r.nombre||'—')} · ${esc(r.pdv||'—')}</span><span class="tl-dur">⏱ ${hhmm(r.duracionMs)}</span></div>
        <div class="tl-meta">${esc(r.ciudad||'—')} · Entrada ${r.fechaInicio?r.fechaInicio.toLocaleString('es-CO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—'} → Salida ${r.fecha?r.fecha.toLocaleString('es-CO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—'}${r.ubicacionURL?' · <a href="'+esc(r.ubicacionURL)+'" target="_blank">📍 Maps</a>':''}</div>
        ${mods?`<div class="tl-mods">${mods}</div>`:''}
      </div></div>`;
  }).join('')+'</div>':'<div class="empty">Sin visitas registradas</div>';

  const dowCnt=Array(7).fill(0); d.forEach(r=>{if(r.dow!=null)dowCnt[r.dow]++;});
  const horas=Array(24).fill(0); d.forEach(r=>{if(r.hora!=null)horas[r.hora]++;});
  const pdvE=Object.entries(d.reduce((m,r)=>{if(r.pdv){m[r.pdv]=(m[r.pdv]||0)+1;}return m;},{})).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const ciuE=Object.entries(d.reduce((m,r)=>{const k=r.ciudad||'—';m[k]=(m[k]||0)+1;return m;},{})).sort((a,b)=>b[1]-a[1]);
  const maxCiu=Math.max(1,...ciuE.map(x=>x[1]));

  cont.innerHTML=`
  ${vHoy>0?`<div class="alert-banner"><svg><use href="#i-check"/></svg><div><b>${vHoy} visitas registradas hoy</b><span>Equipo activo en campo · última actualización ${new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}</span></div></div>`:''}
  <div class="kpis">
    ${kpi('ic-blue','i-map',fN(d.length),'Visitas totales',pdvs+' PDV · '+cius+' ciudades')}
    ${kpi('ic-cyan','i-store',fN(pdvs),'Puntos de venta únicos','')}
    ${kpi('ic-purple','i-pin',fN(cius),'Ciudades cubiertas','')}
    ${kpi('ic-green','i-users',fN(mercs),'Mercaderistas activos','')}
    ${kpi('ic-amber','i-clock',hhmm(durProm),'Duración promedio','entrada → salida')}
    ${kpi('ic-orange','i-clock',hhmm(durMax),'Visita más larga','')}
    ${kpi('ic-teal','i-img',fN(conFotos)+' / '+fN(d.length),'Con registro fotográfico',Math.round(conFotos/Math.max(1,d.length)*100)+'%')}
    ${kpi('ic-pink','i-pin',fN(conGPS)+' / '+fN(d.length),'Con GPS capturado',Math.round(conGPS/Math.max(1,d.length)*100)+'%')}
  </div>
  <div class="g23">
    ${card('Mapa de calor · visitas por hora y día','Cobertura horaria',hmHtml)}
    ${card('Top PDV visitados','Más recurrentes','<div class="tl">'+pdvE.map(([k,v],i)=>`<div class="tr2"><div class="rk${i<3?' g'+(i+1):''}">${i+1}</div><div class="nm">${esc(k)}</div><div class="vl">${v}</div></div>`).join('')+'</div>')}
  </div>
  <div class="g2">
    ${card('Línea de tiempo · entrada → salida',recientes.length+' visitas recientes',tlHtml)}
    <div style="display:flex;flex-direction:column;gap:14px">
      ${card('Visitas por día de semana','','<div class="h240"><canvas id="chDow"></canvas></div>')}
      ${card('Distribución horaria','','<div class="h200"><canvas id="chHVis"></canvas></div>')}
    </div>
  </div>
  <div class="card">${card('Gestiones por ciudad','Cobertura territorial','<div class="tl">'+ciuE.map(([k,v],i)=>`<div class="tr2"><div class="rk${i<3?' g'+(i+1):''}">${i+1}</div><div class="nm">${esc(k)}</div><div class="bar" style="width:${Math.round(v/maxCiu*100)+8}px"></div><div class="vl">${v}</div></div>`).join('')+'</div>').replace(/<div class="card">|<\/div>$/g,'')}</div>`;

  const clrs=['#dc2626','#16a34a','#0ea5e9','#f97316','#7c3aed','#0d9488','#db2777'];
  CH.dow=new Chart(document.getElementById('chDow'),{type:'bar',data:{labels:dias,datasets:[{label:'Visitas',data:dowCnt,backgroundColor:dias.map((_,i)=>clrs[i]),borderRadius:8}]},options:baseOpts({y:{beginAtZero:true,grid:{color:'#f1f5f9'}}},true)});
  CH.hvs=new Chart(document.getElementById('chHVis'),{type:'line',data:{labels:Array.from({length:24},(_,i)=>i+':00'),datasets:[{label:'Visitas',data:horas,borderColor:'#1d4ed8',backgroundColor:'rgba(29,78,216,.1)',fill:true,tension:.4,pointRadius:3}]},options:baseOpts({y:{beginAtZero:true,grid:{color:'#f1f5f9'}}},true)});
}

// ═══════════════════════════════════════════════════════════
// 2. RESUMEN
// ═══════════════════════════════════════════════════════════
function vResumen(cont,d) {
  const vts=d.filter(r=>r.tieneVenta).length;
  const conv=d.length?Math.round(vts/d.length*100):0;
  const tPed=d.reduce((s,r)=>s+r.totalPedido,0);
  const tVenta=d.reduce((s,r)=>s+r.valorVenta,0);
  const nPed=d.filter(r=>r.tienePedido).length;
  const ticket=nPed?tPed/nPed:0;
  const agot=d.reduce((s,r)=>s+(r.agotados||[]).length,0);
  const fc=d.reduce((s,r)=>s+(r.fechasCortas||[]).length,0);
  const muestras=d.reduce((s,r)=>s+r.numMuestras,0);
  const popEnt=d.reduce((s,r)=>s+r.numPOPEntregado,0);

  const p=porDia(d), lbl=p.labels.map(k=>k.slice(5));
  const ciu={}; d.forEach(r=>{const k=r.ciudad||'—';ciu[k]=(ciu[k]||0)+r.totalPedido;});
  const ciuE=Object.entries(ciu).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const pop={Si:0,No:0,Parcial:0}; d.forEach(r=>{if(pop[r.materialPOP]!=null)pop[r.materialPOP]++;});

  cont.innerHTML=`
  <div class="kpis">
    ${kpi('ic-blue','i-grid',fN(d.length),'Gestiones totales','')}
    ${kpi('ic-green','i-check',fN(vts),'Ventas concretadas',conv+'% conversión',{cls:'up',txt:conv+'%'})}
    ${kpi('ic-cyan','i-dollar',fmt(tVenta),'Valor ventas','calculado vs precio SKU')}
    ${kpi('ic-purple','i-cart',fmt(tPed),'Total sugerido','Ticket '+fmt(ticket))}

// ═══════════════════════════════════════════════════════════
// 3. EQUIPO
// ═══════════════════════════════════════════════════════════
function vEquipo(cont,d) {
  const mapa={};
  d.forEach(r=>{
    const k=r.nombre||'—';
    if(!mapa[k]) mapa[k]={nombre:k,foto:r.fotoPerfil,ciudad:r.ciudad,tel:r.telefono,cedula:r.cedula,g:0,v:0,total:0,valorVenta:0,ped:0,agot:0,fechas:[],durs:[],pdvs:new Set()};
    const o=mapa[k]; o.g++; if(r.tieneVenta)o.v++; o.total+=r.totalPedido; o.valorVenta+=r.valorVenta; if(r.tienePedido)o.ped++;
    o.agot+=(r.agotados||[]).length; if(r.fecha)o.fechas.push(r.fecha); if(r.fotoPerfil)o.foto=r.fotoPerfil;
    if(r.duracionMs>0) o.durs.push(r.duracionMs);
    if(r.pdv) o.pdvs.add(r.pdv);
  });

  const arr=Object.values(mapa).map(m=>{
    m.conv=m.g?Math.round(m.v/m.g*100):0;
    m.ticket=m.ped?m.total/m.ped:0;
    m.durProm=m.durs.length?m.durs.reduce((a,x)=>a+x,0)/m.durs.length:0;
    m.numPDV=m.pdvs.size;
    if(m.fechas.length>1){
      const s=m.fechas.slice().sort((a,b)=>a-b);
      const diffs=s.slice(1).map((f,i)=>f-s[i]);
      m.gapMs=diffs.reduce((a,x)=>a+x,0)/diffs.length;
      m.ultVisita=s[s.length-1];
    } else { m.gapMs=null; m.ultVisita=m.fechas[0]||null; }
    return m;
  }).sort((a,b)=>b.total-a.total);

  const maxT=Math.max(1,...arr.map(a=>a.total));
  const tV=arr.reduce((s,m)=>s+m.v,0), tT=arr.reduce((s,m)=>s+m.total,0);
  const avgC=arr.length?Math.round(arr.reduce((s,m)=>s+m.conv,0)/arr.length):0;

  const cards=arr.map(m=>{
    const img=dImg(m.foto,300);
    const ult=m.ultVisita?Math.floor((Date.now()-m.ultVisita)/86400000):null;
    return `<div class="mc">
      <div class="mc-top">
        ${img?`<img class="mc-av" src="${img}" alt="" onerror="this.outerHTML='<div class=\\'mc-avd\\'>${ini(m.nombre)}</div>'">`:`<div class="mc-avd">${ini(m.nombre)}</div>`}
        <div style="flex:1;min-width:0">
          <div class="mc-name">${esc(m.nombre)}</div>
          <div class="mc-sub"><svg><use href="#i-pin"/></svg> ${esc(m.ciudad||'—')}${m.tel?' · '+esc(m.tel):''}</div>
        </div>
      </div>
      <div class="mc-kpis">
        <div class="mk"><b>${m.g}</b><span>Gestiones</span></div>
        <div class="mk"><b>${m.conv}%</b><span>Conversión</span></div>
        <div class="mk"><b>${fmt(m.total)}</b><span>Sugerido</span></div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;font-family:Outfit;font-weight:600"><span>Participación</span><span>${Math.round(m.total/maxT*100)}%</span></div>
        <div style="height:6px;background:var(--line2);border-radius:4px;overflow:hidden"><div style="height:100%;width:${Math.round(m.total/maxT*100)}%;background:linear-gradient(90deg,#2563eb,#06b6d4);border-radius:4px"></div></div>
      </div>
      <div class="mc-stats">
        <div class="mc-stat"><svg><use href="#i-store"/></svg>PDV visitados: <b>${m.numPDV}</b></div>
        ${m.durProm?`<div class="mc-stat"><svg><use href="#i-clock"/></svg>Duración promedio: <b>${hhmm(m.durProm)}</b></div>`:''}
        ${m.gapMs?`<div class="mc-stat"><svg><use href="#i-cal"/></svg>Entre visitas: <b>${hhmm(m.gapMs)}</b></div>`:''}
        <div class="mc-stat"><svg><use href="#i-xc"/></svg>Agotados reportados: <b>${m.agot}</b></div>
        ${ult!=null?`<div class="mc-stat"><svg><use href="#i-clock"/></svg>Última visita: <b>${ult===0?'hoy':ult+' día'+(ult>1?'s':'')+' atrás'}</b></div>`:''}
      </div>
    </div>`;
  }).join('');

  cont.innerHTML=`
  <div class="kpis">
    ${kpi('ic-blue','i-users',fN(arr.length),'Mercaderistas activos','')}
    ${kpi('ic-green','i-check',fN(tV),'Ventas del equipo','')}
    ${kpi('ic-cyan','i-dollar',fmt(tT),'Total sugerido','')}
    ${kpi('ic-purple','i-trend',avgC+'%','Conversión promedio','')}
  </div>
  <div class="team-grid">${cards}</div>`;
}

// ═══════════════════════════════════════════════════════════
// 4. VENTAS — ahora con valor real usando precios SKU

function vVentas(cont,d) {

  const tValor=d.reduce((s,r)=>s+r.valorVenta,0);
  const tickV=vts?tValor/vts:0;
  const undV=d.reduce((s,r)=>s+(r.ventaProductos||[]).reduce((a,p)=>a+num(p.cantidad),0),0);
  const p=porDia(d), lbl=p.labels.map(k=>k.slice(5));
  const horas=Array(24).fill(0); d.forEach(r=>{if(r.hora!=null)horas[r.hora]++;});
  const motivos={}; d.forEach(r=>{if(r.motivoNoVenta)motivos[r.motivoNoVenta]=(motivos[r.motivoNoVenta]||0)+1;});
  const motE=Object.entries(motivos).sort((a,b)=>b[1]-a[1]);
  const ciuMap={}; d.forEach(r=>{const k=r.ciudad||'—';if(!ciuMap[k])ciuMap[k]={t:0,v:0,val:0};ciuMap[k].t++;if(r.tieneVenta)ciuMap[k].v++;ciuMap[k].val+=r.valorVenta;});
  const ciuE=Object.entries(ciuMap).sort((a,b)=>b[1].v/b[1].t-a[1].v/a[1].t).slice(0,8);

  // Top productos vendidos con valor $
  const mp={};
  d.forEach(r=>(r.ventaProductos||[]).forEach(pr=>{
    const k=pr.sku||'—', c=num(pr.cantidad)||0; const ref=SKU_MAP[k]; const pre=ref?ref.precio:0;
    if(!mp[k]) mp[k]={u:0,v:0}; mp[k].u+=c; mp[k].v+=c*pre;
  }));
  const mpE=Object.entries(mp).sort((a,b)=>b[1].v-a[1].v).slice(0,12);
  const topRows=mpE.length?mpE.map(([k,v],i)=>`<tr><td><b>${esc(k)}</b></td><td class="r">${fN(v.u)}</td><td class="r">${fmt(v.v/v.u||0)}</td><td class="r"><b>${fmt(v.v)}</b></td></tr>`).join(''):'<tr><td colspan="4" class="empty">Sin ventas registradas</td></tr>';

  cont.innerHTML=`
  <div class="kpis">
    ${kpi('ic-blue','i-grid',fN(d.length),'Gestiones','')}
    ${kpi('ic-green','i-check',fN(vts),'Ventas concretadas',conv+'% conversión',{cls:'up',txt:conv+'%'})}
    ${kpi('ic-red','i-xc',fN(nvts),'Sin venta','')}
    ${kpi('ic-cyan','i-dollar',fmt(tValor),'Valor total ventas','calculado con precios SKU')}
    ${kpi('ic-purple','i-trend',fmt(tickV),'Ticket promedio venta','')}
    ${kpi('ic-orange','i-pkg',fN(undV),'Unidades vendidas','')}
  </div>
  <div class="g23">
    ${card('Tendencia ventas','Diaria · conversión','<div class="h300"><canvas id="chVT"></canvas></div>')}
    <div style="display:flex;flex-direction:column;gap:14px">
      ${card('Motivos sin venta','Frecuencia',motE.length?'<div class="tl">'+motE.map(([k,v],i)=>`<div class="tr2"><div class="rk${i<3?' g'+(i+1):''}">${i+1}</div><div class="nm">${esc(k)}</div><div class="vl">${v}</div></div>`).join('')+'</div>':'<div class="empty">Sin registros</div>')}
    </div>
  </div>
  <div class="g2">
    ${card('Top productos vendidos · con valor','Calculado vs precio SKU sugerido','<div class="tw"><table><thead><tr><th>Producto</th><th class="r">Unidades</th><th class="r">$ unitario</th><th class="r">$ total</th></tr></thead><tbody>'+topRows+'</tbody></table></div>')}
    ${card('Conversión por ciudad','%','<div class="h260"><canvas id="chCC"></canvas></div>')}
  </div>`;

  CH.vt=new Chart(document.getElementById('chVT'),{data:{labels:lbl,datasets:[
    {type:'bar',label:'Con venta',data:p.labels.map(k=>d.filter(r=>r.tieneVenta&&r.fecha&&r.fecha.toISOString().slice(0,10)===k).length),backgroundColor:'rgba(22,163,74,.75)',borderRadius:6,yAxisID:'y'},
    {type:'bar',label:'Sin venta',data:p.labels.map(k=>d.filter(r=>!r.tieneVenta&&r.fecha&&r.fecha.toISOString().slice(0,10)===k).length),backgroundColor:'rgba(220,38,38,.5)',borderRadius:6,yAxisID:'y'},
    {type:'line',label:'Conversión %',data:p.labels.map(k=>{const tot=d.filter(r=>r.fecha&&r.fecha.toISOString().slice(0,10)===k).length;const vv=d.filter(r=>r.tieneVenta&&r.fecha&&r.fecha.toISOString().slice(0,10)===k).length;return tot?Math.round(vv/tot*100):0;}),borderColor:'#7c3aed',borderWidth:2,pointRadius:3,tension:.3,yAxisID:'y1'}
  ]},options:baseOpts({y:{beginAtZero:true,stacked:true,grid:{color:'#f1f5f9'}},y1:{position:'right',min:0,max:100,ticks:{callback:v=>v+'%'},grid:{drawOnChartArea:false}}})});
  CH.cc=new Chart(document.getElementById('chCC'),{type:'bar',data:{labels:ciuE.map(([k])=>k),datasets:[{label:'% Conversión',data:ciuE.map(([,v])=>Math.round(v.v/v.t*100)),backgroundColor:'rgba(13,148,136,.8)',borderRadius:8}]},options:baseOpts({y:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%'},grid:{color:'#f1f5f9'}}},true)});

// ═══════════════════════════════════════════════════════════
// 5. SUGERIDO
// ═══════════════════════════════════════════════════════════
function vSugerido(cont,d) {
  const cp=d.filter(r=>r.tienePedido).sort((a,b)=>(b.fecha||0)-(a.fecha||0));
  const total=cp.reduce((s,r)=>s+r.totalPedido,0);
  const und=cp.reduce((s,r)=>s+(r.pedidoProductos||[]).reduce((a,p)=>a+num(p.cantidad),0),0);
  const ticket=cp.length?total/cp.length:0;
  const promos=cp.filter(r=>r.pedidoPromos).length;
  const pm={}; cp.forEach(r=>{const k=r.nombre||'—';if(!pm[k])pm[k]={n:0,v:0};pm[k].n++;pm[k].v+=r.totalPedido;});
  const pmE=Object.entries(pm).sort((a,b)=>b[1].v-a[1].v);
  const rows=cp.slice(0,100).map(r=>`<tr>
    <td>${r.fecha?r.fecha.toLocaleDateString('es-CO'):'—'}</td>
    <td><b>${esc(r.nombre)}</b></td>
    <td>${esc(r.ciudad||'—')}</td>
    <td>${esc(r.pdv||'—')}</td>
    <td class="r">${r.numProductos}</td>
    <td class="r"><b>${fmt(r.totalPedido)}</b></td>
  </tr>`).join('');

  cont.innerHTML=`
  <div class="kpis">
    ${kpi('ic-blue','i-cart',fN(cp.length),'Sugeridos generados','')}
    ${kpi('ic-cyan','i-dollar',fmt(total),'Valor total','')}
    ${kpi('ic-green','i-box',fN(und),'Unidades sugeridas','')}
    ${kpi('ic-purple','i-trend',fmt(ticket),'Ticket promedio','')}
    ${kpi('ic-orange','i-star',fN(promos),'Con promociones','')}
  </div>
  <div class="g23">
    ${card('Sugeridos recientes',cp.length+' registros',`<div class="tw"><table>
      <thead><tr><th>Fecha</th><th>Mercaderista</th><th>Ciudad</th><th>PDV</th><th class="r">Ítems</th><th class="r">Total</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6" class="empty">Sin sugeridos</td></tr>'}</tbody>
    </table></div>`)}
    <div style="display:flex;flex-direction:column;gap:14px">
      ${card('Top productos sugeridos','Unidades',`<div style="max-height:280px;overflow-y:auto">${topList(cp,'pedidoProductos',false)}</div>`)}
      ${card('Por mercaderista','Valor','<div class="tl">'+pmE.slice(0,8).map(([k,v],i)=>`<div class="tr2"><div class="rk${i<3?' g'+(i+1):''}">${i+1}</div><div class="nm">${esc(k)}</div><div class="vl">${fmt(v.v)}</div></div>`).join('')+'</div>')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// 6. CHEK DE PRECIOS · comparativo propio vs competencia + reporte
// ═══════════════════════════════════════════════════════════
function vChequeo(cont,d) {
  const chL=[]; d.forEach(r=>(r.chequeoPrecios||[]).forEach(c=>chL.push({...c,pdv:r.pdv,merc:r.nombre,fecha:r.fecha,ciudad:r.ciudad})));
  const compL=[]; d.forEach(r=>(r.chequeoCompetencia||[]).forEach(c=>compL.push({...c,pdv:r.pdv,merc:r.nombre,fecha:r.fecha,ciudad:r.ciudad})));
  const ok=chL.filter(c=>c.dentroDelRango===true||c.dentroDelRango==='true').length;
  const fuera=chL.length-ok;
  const pctOk=chL.length?Math.round(ok/chL.length*100):0;

  // Comparativo precio nuestro vs competencia (agrupado por PDV)
  const pdvMix={};
  chL.forEach(c=>{
    const k=c.pdv||'—';
    if(!pdvMix[k]) pdvMix[k]={pdv:k,nuestros:[],comp:[],ciudad:c.ciudad,merc:c.merc};
    pdvMix[k].nuestros.push({sku:c.sku, encontrado:num(c.precioEncontrado), referencia:num(c.precioReferencia)});
  });
  compL.forEach(c=>{
    const k=c.pdv||'—';
    if(!pdvMix[k]) pdvMix[k]={pdv:k,nuestros:[],comp:[],ciudad:c.ciudad,merc:c.merc};
    pdvMix[k].comp.push({producto:c.producto, valor:num(c.valor), tipo:c.tipo});
  });
  const mixRows = Object.values(pdvMix).map(m=>{
    const promN = m.nuestros.length ? m.nuestros.reduce((s,x)=>s+x.encontrado,0)/m.nuestros.length : 0;
    const promC = m.comp.length ? m.comp.reduce((s,x)=>s+x.valor,0)/m.comp.length : 0;
    const diff = promC>0 && promN>0 ? Math.round((promN-promC)/promC*100) : null;
    let estado='', pillCls='info';
    if(diff===null) estado='—';
    else if(diff>5){ estado='Más caros '+diff+'%'; pillCls='bad'; }
    else if(diff<-5){ estado='Más baratos '+Math.abs(diff)+'%'; pillCls='ok'; }
    else { estado='Competitivos'; pillCls='ok'; }
    return `<tr>
      <td><b>${esc(m.pdv)}</b><div style="font-size:10.5px;color:var(--muted)">${esc(m.ciudad||'—')} · ${esc(m.merc||'—')}</div></td>
      <td class="r">${m.nuestros.length?fmt(promN):'—'}<div style="font-size:10.5px;color:var(--muted)">${m.nuestros.length} chequeos</div></td>
      <td class="r">${m.comp.length?fmt(promC):'—'}<div style="font-size:10.5px;color:var(--muted)">${m.comp.length} chequeos</div></td>
      <td class="r"><span class="pill ${pillCls}">${estado}</span></td>
    </tr>`;
  }).join('');

  // Tabla detallada propios
  const rowsCh=chL.slice().sort((a,b)=>(b.fecha||0)-(a.fecha||0)).slice(0,80).map(c=>{
    const ok=(c.dentroDelRango===true||c.dentroDelRango==='true');
    const ref=num(c.precioReferencia), en=num(c.precioEncontrado);
    const diff = ref>0 ? ((en-ref)/ref*100).toFixed(1) : '0';
    return `<tr>
      <td><b>${esc(c.sku||'—')}</b></td>
      <td class="r">${fmt(en)}</td>
      <td class="r">${fmt(ref)}</td>
      <td class="r" style="color:${parseFloat(diff)>0?'#dc2626':parseFloat(diff)<0?'#16a34a':'#64748b'};font-weight:700">${parseFloat(diff)>0?'+':''}${diff}%</td>
      <td>${ok?'<span class="pill ok">En rango</span>':'<span class="pill bad">Fuera</span>'}</td>
      <td>${esc(c.pdv||'—')}</td>
    </tr>`;
  }).join('');

  const rowsComp=compL.slice().sort((a,b)=>(b.fecha||0)-(a.fecha||0)).slice(0,80).map(c=>`<tr>
    <td><b>${esc(c.producto||'—')}</b></td>
    <td class="r">${fmt(c.valor)}</td>
    <td><span class="pill ${c.tipo==='2x1'?'warn':c.tipo==='Promoción'?'info':'ok'}">${esc(c.tipo||'Normal')}</span></td>
    <td>${esc(c.pdv||'—')}</td>
    <td>${esc(c.ciudad||'—')}</td>
  </tr>`).join('');

  cont.innerHTML=`
  ${fuera>0?`<div class="alert-banner ${fuera>3?'bad':''}"><svg><use href="#i-alert"/></svg><div><b>${fuera} chequeos fuera del rango ±10%</b><span>Revisar precios propios en los PDV afectados</span></div></div>`:''}
  <div class="kpis">
    ${kpi('ic-blue','i-tag',fN(chL.length),'Chequeos propios','')}
    ${kpi('ic-green','i-check',pctOk+'%','Dentro del rango ±10%',ok+' de '+chL.length,{cls:pctOk>=80?'up':'down',txt:pctOk+'%'})}
    ${kpi('ic-red','i-xc',fN(fuera),'Fuera de rango','')}
    ${kpi('ic-purple','i-cart',fN(compL.length),'Chequeos competencia','')}
  </div>
  <div class="card">
    <div class="card-h"><h3><svg><use href="#i-tag"/></svg>Mix de precios · Propio vs Competencia por PDV</h3>
      <button class="btn pri" onclick="window.print()"><svg><use href="#i-print"/></svg>Generar reporte</button>
    </div>
    <div class="tw"><table>
      <thead><tr><th>PDV</th><th class="r">Promedio nuestro</th><th class="r">Promedio competencia</th><th class="r">Estado competitivo</th></tr></thead>
      <tbody>${mixRows||'<tr><td colspan="4" class="empty">Sin chequeos</td></tr>'}</tbody>
    </table></div>
  </div>
  <div style="height:14px"></div>
  <div class="g2">
    ${card('Chequeos de precio propio','Detalle reciente con desviación %',`<div class="tw"><table>
      <thead><tr><th>Producto</th><th class="r">PDV</th><th class="r">Ref</th><th class="r">Δ%</th><th>Estado</th><th>PDV</th></tr></thead>
      <tbody>${rowsCh||'<tr><td colspan="6" class="empty">Sin chequeos</td></tr>'}</tbody>
    </table></div>`)}
    ${card('Chequeos de competencia','Detalle reciente',`<div class="tw"><table>
      <thead><tr><th>Producto</th><th class="r">Valor</th><th>Condición</th><th>PDV</th><th>Ciudad</th></tr></thead>
      <tbody>${rowsComp||'<tr><td colspan="5" class="empty">Sin chequeos</td></tr>'}</tbody>
    </table></div>`)}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// 7. INVENTARIO (estante + exhibición)
// ═══════════════════════════════════════════════════════════
function vInventario(cont,d) {
  const invP=d.reduce((s,r)=>s+(r.inventarioProductos||[]).length,0);
  const exh=d.filter(r=>r.tieneExhibicion==='Si');
  const exhTipo={}; exh.forEach(r=>{const k=r.tipoExhibicion||'—';exhTipo[k]=(exhTipo[k]||0)+1;});
  const pdvs=new Set(d.map(r=>r.pdv).filter(Boolean)).size;

  // Detalle de inventario por PDV
  const invDet=[];
  d.forEach(r=>(r.inventarioProductos||[]).forEach(p=>{
    invDet.push({sku:p.sku,categoria:p.categoria,cantidad:num(p.cantidad),pdv:r.pdv,ciudad:r.ciudad,merc:r.nombre,fecha:r.fecha});
  }));
  invDet.sort((a,b)=>a.cantidad-b.cantidad);
  const rowsInv = invDet.slice(0,60).map(p=>{
    const c=p.cantidad;
    const sev = c<=3?'crit':c<=8?'warn':'';
    const tag = c<=3?'<span class="pill bad">Bajo · '+c+' und</span>':c<=8?'<span class="pill warn">Vigilar · '+c+' und</span>':'<span class="pill ok">OK · '+c+' und</span>';
    return `<tr><td><b>${esc(p.sku||'—')}</b></td><td class="r">${tag}</td><td>${esc(p.pdv||'—')}</td><td>${esc(p.ciudad||'—')}</td><td>${esc(p.merc||'—')}</td></tr>`;
  }).join('');

  cont.innerHTML=`
  <div class="kpis">
    ${kpi('ic-blue','i-box',fN(invP),'Refs. en inventario','')}
    ${kpi('ic-teal','i-store',fN(pdvs),'PDV con inventario','')}
    ${kpi('ic-purple','i-star',fN(exh.length),'Exhibiciones ganadas','')}
    ${kpi('ic-green','i-check',fN(invDet.filter(x=>x.cantidad>8).length),'Productos con stock OK','')}
  </div>
  <div class="g2">
    ${card('Top inventario en estante','Refs. más frecuentes',`<div style="max-height:280px;overflow-y:auto">${topList(d,'inventarioProductos',true)}</div>`)}
    ${card('Tipos de exhibición ganada','Frecuencia',Object.keys(exhTipo).length?'<div class="tl">'+Object.entries(exhTipo).sort((a,b)=>b[1]-a[1]).map(([k,v],i)=>`<div class="tr2"><div class="rk${i<3?' g'+(i+1):''}">${i+1}</div><div class="nm">${esc(k)}</div><div class="vl">${v}</div></div>`).join('')+'</div>':'<div class="empty">Sin exhibiciones</div>')}
  </div>
  <div class="card">
    <div class="card-h"><h3><svg><use href="#i-box"/></svg>Detalle de inventario · ordenado por cantidad ascendente</h3><span class="tag">${invDet.length} registros</span></div>
    <div class="tw"><table>
      <thead><tr><th>Producto</th><th class="r">Estado</th><th>PDV</th><th>Ciudad</th><th>Mercaderista</th></tr></thead>
      <tbody>${rowsInv||'<tr><td colspan="5" class="empty">Sin inventario registrado</td></tr>'}</tbody>
    </table></div>
  </div>
  <div style="height:14px"></div>
  ${card('Top productos en exhibición','Unidades',`<div style="max-height:280px;overflow-y:auto">${topList(d,'exhibicionProductos',false)}</div>`)}`;
}

// ═══════════════════════════════════════════════════════════
// 8. AGOTADOS · con alertas reales
// ═══════════════════════════════════════════════════════════
function vAgotados(cont,d) {
  const agL=[]; d.forEach(r=>(r.agotados||[]).forEach(a=>agL.push({sku:a.sku,categoria:a.categoria,cantidad:num(a.cantidad),pdv:r.pdv,ciudad:r.ciudad,merc:r.nombre,fecha:r.fecha})));
  agL.sort((a,b)=>(b.fecha||0)-(a.fecha||0));
  // Frecuencia por SKU
  const freq={};
  agL.forEach(a=>{ const k=a.sku||'—'; if(!freq[k])freq[k]={n:0,pdvs:new Set(),categoria:a.categoria}; freq[k].n++; if(a.pdv)freq[k].pdvs.add(a.pdv); });
  const freqArr=Object.entries(freq).map(([k,v])=>({sku:k,n:v.n,pdvs:v.pdvs.size,categoria:v.categoria})).sort((a,b)=>b.n-a.n);
  const recurrentes=freqArr.filter(x=>x.n>=3);
  const pdvAg={}; agL.forEach(a=>{const k=a.pdv||'—'; pdvAg[k]=(pdvAg[k]||0)+1;});
  const pdvE=Object.entries(pdvAg).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const ult7d=agL.filter(a=>a.fecha&&(Date.now()-a.fecha)<7*86400000).length;

  const sevList = freqArr.slice(0,20).map(x=>{
    const cls = x.n>=5?'crit':x.n>=3?'warn':'info';
    return `<div class="sev-row ${cls}">
      <div class="sev-ic">${x.n}</div>
      <div class="sev-content"><div class="sev-name">${esc(x.sku)}</div><div class="sev-meta">${esc(x.categoria||'—')} · en ${x.pdvs} PDV diferentes</div></div>
      <div class="sev-val">${x.n} casos</div>
    </div>`;
  }).join('');

  const rowsAg = agL.slice(0,80).map(a=>{
    const dias = a.fecha?Math.floor((Date.now()-a.fecha)/86400000):null;
    return `<tr><td><b>${esc(a.sku||'—')}</b></td><td>${esc(a.categoria||'—')}</td><td>${esc(a.pdv||'—')}</td><td>${esc(a.ciudad||'—')}</td><td>${esc(a.merc||'—')}</td><td class="r">${dias!=null?(dias===0?'<span class="pill bad">Hoy</span>':dias+' días'):'—'}</td></tr>`;
  }).join('');

  cont.innerHTML=`
  ${recurrentes.length?`<div class="alert-banner bad"><svg><use href="#i-alert"/></svg><div><b>${recurrentes.length} productos con agotamiento recurrente (≥3 reportes)</b><span>Problema sistémico · revisar abastecimiento</span></div></div>`:''}
  <div class="kpis">
    ${kpi('ic-red','i-xc',fN(agL.length),'Reportes de agotado','')}
    ${kpi('ic-orange','i-alert',fN(freqArr.length),'Productos únicos agotados','')}
    ${kpi('ic-purple','i-store',fN(Object.keys(pdvAg).length),'PDV afectados','')}
    ${kpi('ic-amber','i-clock',fN(ult7d),'Reportes últimos 7 días','')}
  </div>
  <div class="g2">
    ${card('Productos con mayor frecuencia de agotamiento','Top 20',sevList||'<div class="empty">Sin agotados</div>',recurrentes.length?'alert':'')}
    ${card('PDV con más agotados','Top 12','<div class="tl">'+pdvE.map(([k,v],i)=>`<div class="tr2"><div class="rk${i<3?' g'+(i+1):''}">${i+1}</div><div class="nm">${esc(k)}</div><div class="vl">${v}</div></div>`).join('')+'</div>')}
  </div>
  <div class="card">
    <div class="card-h"><h3><svg><use href="#i-xc"/></svg>Detalle de agotados</h3>
      <button class="btn pri" onclick="window.print()"><svg><use href="#i-print"/></svg>Reporte</button>
    </div>
    <div class="tw"><table>
      <thead><tr><th>Producto</th><th>Categoría</th><th>PDV</th><th>Ciudad</th><th>Mercaderista</th><th class="r">Reportado</th></tr></thead>
      <tbody>${rowsAg||'<tr><td colspan="6" class="empty">Sin agotados registrados</td></tr>'}</tbody>
    </table></div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// 9. FECHAS CORTAS · alertas por días
// ═══════════════════════════════════════════════════════════
function vFechas(cont,d) {
  const fcL=[]; d.forEach(r=>(r.fechasCortas||[]).forEach(f=>{
    const dias=diasHasta(f.vence);
    fcL.push({sku:f.sku,categoria:f.categoria,vence:f.vence,cantidad:num(f.cantidad),pdv:r.pdv,ciudad:r.ciudad,merc:r.nombre,fecha:r.fecha,dias:dias});
  }));
  fcL.sort((a,b)=>(a.dias==null?9999:a.dias)-(b.dias==null?9999:b.dias));
  const crit=fcL.filter(f=>f.dias!=null && f.dias<=7);
  const urgentes=fcL.filter(f=>f.dias!=null && f.dias>7 && f.dias<=30);
  const vigilar=fcL.filter(f=>f.dias!=null && f.dias>30 && f.dias<=60);
  const promDias=fcL.length?Math.round(fcL.filter(f=>f.dias!=null).reduce((s,f)=>s+f.dias,0)/Math.max(1,fcL.filter(f=>f.dias!=null).length)):0;

  const rows = fcL.map(f=>{
    let cls='', tag='';
    if(f.dias==null){ cls=''; tag='<span class="pill info">Sin fecha</span>'; }
    else if(f.dias<0){ cls='crit'; tag='<span class="pill bad">Vencido</span>'; }
    else if(f.dias<=7){ cls='crit'; tag='<span class="pill bad">'+f.dias+' días</span>'; }
    else if(f.dias<=30){ cls='warn'; tag='<span class="pill warn">'+f.dias+' días</span>'; }
    else { cls=''; tag='<span class="pill ok">'+f.dias+' días</span>'; }
    return `<tr><td><b>${esc(f.sku||'—')}</b></td><td>${esc(f.categoria||'—')}</td><td>${esc(f.vence||'—')}</td><td class="r">${tag}</td><td class="r">${f.cantidad}</td><td>${esc(f.pdv||'—')}</td><td>${esc(f.merc||'—')}</td></tr>`;
  }).join('');

  const sevCrit = crit.slice(0,15).map(f=>`<div class="sev-row crit">
    <div class="sev-ic">${f.dias<0?'!':f.dias}</div>
    <div class="sev-content"><div class="sev-name">${esc(f.sku)}</div><div class="sev-meta">${esc(f.pdv||'—')} · ${f.cantidad} und · vence ${esc(f.vence||'—')}</div></div>
    <div class="sev-val">${f.dias<0?'Vencido':f.dias+'d'}</div>
  </div>`).join('');

  cont.innerHTML=`
  ${crit.length?`<div class="alert-banner bad"><svg><use href="#i-alert"/></svg><div><b>${crit.length} productos vencen en 7 días o menos</b><span>Tomar acción inmediata · liquidar, devolver o promocionar</span></div></div>`:''}
  ${urgentes.length&&!crit.length?`<div class="alert-banner"><svg><use href="#i-alert"/></svg><div><b>${urgentes.length} productos vencen en menos de 30 días</b><span>Planificar rotación con el PDV</span></div></div>`:''}
  <div class="kpis">
    ${kpi('ic-red','i-alert',fN(crit.length),'Críticos · ≤7 días','acción inmediata')}
    ${kpi('ic-orange','i-clock',fN(urgentes.length),'Urgentes · 8-30 días','')}
    ${kpi('ic-amber','i-cal',fN(vigilar.length),'Vigilar · 31-60 días','')}
    ${kpi('ic-blue','i-clock',promDias+'d','Promedio hasta vencer','')}
  </div>
  ${crit.length?`<div class="card alert"><div class="card-h"><h3><svg><use href="#i-alert"/></svg>Críticos · acción inmediata</h3><span class="tag alert">${crit.length} productos</span></div>${sevCrit}</div><div style="height:14px"></div>`:''}
  <div class="card">
    <div class="card-h"><h3><svg><use href="#i-clock"/></svg>Detalle de fechas cortas · ordenado por urgencia</h3>
      <button class="btn pri" onclick="window.print()"><svg><use href="#i-print"/></svg>Reporte</button>
    </div>
    <div class="tw"><table>
      <thead><tr><th>Producto</th><th>Categoría</th><th>Vence</th><th class="r">Días</th><th class="r">Cant.</th><th>PDV</th><th>Mercaderista</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="7" class="empty">Sin fechas cortas registradas</td></tr>'}</tbody>
    </table></div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// 10. MUESTRAS Y POP
// ═══════════════════════════════════════════════════════════
function vMuestrasPop(cont,d) {
  const muestras=d.reduce((s,r)=>s+r.numMuestras,0);
  const pop=d.reduce((s,r)=>s+r.numPOPEntregado,0);
  const pdvMuestras=new Set(d.filter(r=>r.numMuestras>0).map(r=>r.pdv)).size;
  const pdvPop=new Set(d.filter(r=>r.numPOPEntregado>0).map(r=>r.pdv)).size;
  const popEstado={Si:0,No:0,Parcial:0}; d.forEach(r=>{if(popEstado[r.materialPOP]!=null)popEstado[r.materialPOP]++;});

  cont.innerHTML=`
  <div class="kpis">
    ${kpi('ic-amber','i-pkg',fN(muestras),'Muestras entregadas',pdvMuestras+' PDV')}
    ${kpi('ic-blue','i-tag',fN(pop),'Material POP entregado',pdvPop+' PDV')}
    ${kpi('ic-green','i-check',fN(popEstado.Si),'POP en buen estado','')}
    ${kpi('ic-red','i-xc',fN(popEstado.No)+' / '+fN(popEstado.Parcial),'POP malo / parcial','')}
  </div>
  <div class="g2">
    ${card('Top muestras entregadas','Unidades',`<div style="max-height:300px;overflow-y:auto">${topList(d,'muestrasProductos',false)}</div>`)}
    ${card('Top material POP entregado','Unidades',`<div style="max-height:300px;overflow-y:auto">${topList(d,'materialPOPEntregado',false)}</div>`)}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// 11. GALERÍA — más grande + lightbox
// ═══════════════════════════════════════════════════════════
let GAL_DATA=[];
function vGaleria(cont,d) {
  GAL_DATA=d.filter(r=>r.fotoAntes||r.fotoDespues).sort((a,b)=>(b.fecha||0)-(a.fecha||0));
  const completas=GAL_DATA.filter(r=>r.fotoAntes&&r.fotoDespues).length;
  const pendientes=GAL_DATA.filter(r=>!r.fotoDespues).length;
  const cards=GAL_DATA.map((r,idx)=>{
    const ia=dImg(r.fotoAntes,500), ib=dImg(r.fotoDespues,500);
    return `<div class="gal-card" onclick="abrirLB(${idx})">
      <div class="gal-imgs">
        <div class="gal-img">${ia?`<img src="${ia}" alt="Antes" loading="lazy">`:'<div class="ph">Sin foto</div>'}<span>Antes</span></div>
        <div class="gal-img">${ib?`<img src="${ib}" alt="Después" loading="lazy">`:'<div class="ph">Pendiente</div>'}<span>Después</span></div>
      </div>
      <div class="gal-info">
        <b>${esc(r.pdv||'—')}</b>
        <div class="gal-sub"><span>${esc(r.ciudad||'—')}</span><span>${r.fecha?r.fecha.toLocaleDateString('es-CO',{day:'2-digit',month:'short'}):'—'}</span></div>
        <div class="gal-merc"><svg><use href="#i-user"/></svg>${esc(r.nombre||'—')}</div>
      </div>
    </div>`;
  }).join('');

  cont.innerHTML=`
  <div class="kpis">
    ${kpi('ic-blue','i-img',fN(GAL_DATA.length),'Visitas con foto','')}
    ${kpi('ic-green','i-check',fN(completas),'Con Antes y Después',Math.round(completas/Math.max(1,GAL_DATA.length)*100)+'%')}
    ${kpi('ic-orange','i-clock',fN(pendientes),'Pendientes foto Después','')}
  </div>
  <div class="card">
    <div class="card-h"><h3><svg><use href="#i-img"/></svg>Galería Antes / Después</h3><span class="tag">Click para ampliar</span></div>
    ${GAL_DATA.length?`<div class="gal-grid">${cards}</div>`:'<div class="empty">Sin fotos registradas</div>'}
  </div>`;
}
function abrirLB(idx){
  const r=GAL_DATA[idx]; if(!r) return;
  const ia=dImg(r.fotoAntes,1200), ib=dImg(r.fotoDespues,1200);
  document.getElementById('lbPic1').innerHTML = ia?`<img src="${ia}"><span>Antes</span>`:`<div class="lb-ph">Sin foto Antes</div><span>Antes</span>`;
  document.getElementById('lbPic2').innerHTML = ib?`<img src="${ib}"><span>Después</span>`:`<div class="lb-ph">Pendiente foto Después</div><span>Después</span>`;
  document.getElementById('lb').classList.add('on');
  document.body.style.overflow='hidden';
}
function cerrarLB(e){ if(e && e.target.closest('.lb-box')) return; document.getElementById('lb').classList.remove('on'); document.body.style.overflow=''; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') cerrarLB(); });

</script>
